<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO CLASH | Multiplayer Fighting Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="splash-screen" class="screen active">
        <h1>HERO CLASH</h1>
        <div class="loader"></div>
    </div>

    <div id="home-screen" class="screen">
        <h1>HERO CLASH</h1>
        <div class="menu-buttons">
            <button onclick="createRoom()">CREATE ROOM</button>
            <button onclick="showJoinScreen()">JOIN ROOM</button>
            <button onclick="startOffline()">OFFLINE MODE</button>
        </div>
    </div>

    <div id="room-screen" class="screen">
        <h2 id="room-display">ROOM: ----</h2>
        <p id="waiting-msg">Waiting for Player 2...</p>
        <div id="join-input-area">
            <input type="text" id="room-input" placeholder="4-DIGIT CODE" maxlength="4">
            <button onclick="joinRoom()">JOIN NOW</button>
        </div>
        <button class="back-btn" onclick="location.reload()">BACK</button>
    </div>

    <div id="select-screen" class="screen">
        <h2 id="turn-indicator">Player 1: Select Hero</h2>
        <div class="character-grid" id="char-grid"></div>
        <div class="previews">
            <div id="p1-preview" class="preview-box">P1: <span>None</span></div>
            <div id="p2-preview" class="preview-box">P2: <span>None</span></div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="ui-overlay">
            <div class="health-container">
                <div class="health-bar"><div id="p1-health-fill"></div></div>
                <div id="p1-name">PLAYER 1</div>
            </div>
            <div class="timer" id="game-timer">90</div>
            <div class="health-container">
                <div class="health-bar"><div id="p2-health-fill"></div></div>
                <div id="p2-name">PLAYER 2</div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="winner-screen" class="screen">
        <h1 id="winner-text">PLAYER 1 WINS!</h1>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
